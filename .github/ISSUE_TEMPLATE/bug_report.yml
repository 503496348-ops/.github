name: Bug Report
about: 报告可复现缺陷
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        请提供可复现证据。没有复现步骤的问题会被要求补充信息。
  - type: input
    id: repo
    attributes:
      label: 相关仓库/模块
      placeholder: repo-name / module
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写清楚从干净环境开始如何复现。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果 / 日志
      render: shell
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      placeholder: OS / Node / Python / browser / dependency versions
    validations:
      required: false
