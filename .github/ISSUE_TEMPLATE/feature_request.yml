name: Feature Request
about: 提出功能建议或产品增强
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 用户问题 / 场景
      description: 先说用户要解决什么问题，不要直接跳到实现。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / 不做的代价
    validations:
      required: false
